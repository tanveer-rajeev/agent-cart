
auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:9090}

spring:
  application:
    name: api-gateway
  config:
    import: "configserver:${CONFIG_SERVER_URL:http://cloud-config-server:8888}"
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - name: Authentication
                - name: CircuitBreaker
                  args:
                    name: orderCircuitBreaker
                    fallbackUri: forward:/orderFallBack

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: Authentication
                - name: CircuitBreaker
                  args:
                    name: identityCircuitBreaker
                    fallbackUri: forward:/identityFallBack

            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/v1/products/**
              filters:
                - name: Authentication
                - name: CircuitBreaker
                  args:
                    name: productCircuitBreaker
                    fallbackUri: forward:/productFallBack

            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/v1/inventories/**
              filters:
                - name: Authentication
                - name: CircuitBreaker
                  args:
                    name: inventoryCircuitBreaker
                    fallbackUri: forward:/inventoryFallBack

            - id: agent
              uri: lb://AGENT
              predicates:
                - Path=/api/v1/agent/**
              filters:
                - name: Authentication
                - name: CircuitBreaker
                  args:
                    name: agentCircuitBreaker
                    fallbackUri: forward:/agentFallBack
